services:
  front:
    build:
      context: ./front
    container_name: meliodash-front
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - back

  back:
    build:
      context: ./back
    container_name: meliodash-back
    restart: unless-stopped
    ports:
      - "3001:3001"
