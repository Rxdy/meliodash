services:
  front:
    build:
      context: ./front
    container_name: metryx-front
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - back

  # network_mode: host donne au back un accès direct aux interfaces réseau
  # de la machine hôte (Raspberry Pi ou machine de dev), pour que /api/metrics
  # reflète le vrai réseau physique et non une interface virtuelle du container.
  back:
    build:
      context: ./back
    container_name: metryx-back
    restart: unless-stopped
    network_mode: host
